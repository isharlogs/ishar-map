        function nodeColor(category) {
            if (category === 'ores')  return 'var(--node-ore)';
            if (category === 'herbs') return 'var(--node-herb)';
            if (category === 'hides') return 'var(--node-hide)';
            return 'var(--text-muted)';
        }

        function nodeIcon(category) {
            if (category === 'ores')  return '⛏';
            if (category === 'herbs') return '🌿';
            if (category === 'hides') return '🐾';
            return '◆';
        }

        function updateRoomNodeList(room) {
            const list = document.getElementById('roomNodeList');
            if (!list) return;
            const nodes = (room && room.nodes) || [];
            if (nodes.length === 0) {
                list.innerHTML = '<div class="npc-empty">No crafting nodes in this room</div>';
                return;
            }
            list.innerHTML = '';
            // Group by category
            const byCategory = {};
            for (const n of nodes) {
                const cat = n.category || 'unknown';
                (byCategory[cat] = byCategory[cat] || []).push(n);
            }
            for (const [cat, entries] of Object.entries(byCategory)) {
                const header = document.createElement('div');
                header.style.cssText = `color:${nodeColor(cat)};font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin:6px 0 3px;`;
                header.textContent = `${nodeIcon(cat)} ${cat}`;
                list.appendChild(header);
                for (const n of entries) {
                    const card = document.createElement('div');
                    card.className = 'npc-card';
                    card.style.borderColor = nodeColor(cat);
                    const countTxt = n.count > 1 ? ` ×${n.count}` : '';
                    card.innerHTML = `
                        <div class="npc-card-header">
                            <div class="npc-dot" style="background:${nodeColor(cat)}">${nodeIcon(cat)}</div>
                            <div class="npc-name">${escapeHtml(n.name)}</div>
                        </div>
                        <div class="npc-desc" style="display:block;margin-top:4px;">Rank ${n.rank}${countTxt}</div>
                    `;
                    list.appendChild(card);
                }
            }
        }

        function updateZoneLoadsList(zone) {
            const container = document.getElementById('zoneLoadsList');
            if (!container || !zone) return;
            const itemsSeen = new Set();
            for (const floor of Object.values(zone.floors)) {
                for (const room of Object.values(floor.rooms)) {
                    for (const npc of (room.npcs || [])) {
                        const data = state.npcData[npc.name];
                        if (data && data.loads) {
                            for (const item of data.loads) {
                                itemsSeen.add(item);
                            }
                        }
                    }
                }
            }
            container.innerHTML = '';
            const sorted = [...itemsSeen].sort();
            if (sorted.length === 0) {
                container.innerHTML = '<div class="npc-empty">No item loads recorded</div>';
                return;
            }
            sorted.forEach(item => {
                const chip = document.createElement('span');
                chip.className = 'load-chip';
                chip.dataset.item = item;
                chip.textContent = item;
                chip.style.cursor = 'pointer';
                chip.addEventListener('mouseenter', e => showItemHoverCard(item));
                chip.addEventListener('mouseleave', () => scheduleHideHoverCard());
                container.appendChild(chip);
            });
        }

        function getRoom(zone, vnum) {
            for (let floor of Object.values(zone.floors)) {
                if (floor.rooms[String(vnum)]) {
                    return floor.rooms[String(vnum)];
                }
            }
            return null;
        }

        // When navigating to a room that's part of a stack, make it the
        // active member so it renders fully instead of as a ghost.
        function activateStackRoom(vnum, zoneName, floor) {
            const zone = state.allZones[zoneName];
            if (!zone) return;
            const floorData = zone.floors[String(floor)];
            if (!floorData) return;
            const room = floorData.rooms[String(vnum)];
            if (!room || !room.stack) return;
            const cellKey = `${zoneName}|${room.grid_x},${room.grid_y},${floor}`;
            state.stackActiveMap[cellKey] = vnum;
        }

        async function navigateToRoom(toVnum, toZone) {
            NAV_pushHistory();
            if (state.currentZone !== toZone) {
                const data = await loadZoneData(toZone);
                if (!data) return;

                state.currentZone = toZone;
                
                // Find the floor with this room - iterate actual floor IDs
                const floorIds = Object.keys(data.floors).map(k => parseInt(k));
                for (const f of floorIds) {
                    if (data.floors[String(f)].rooms[String(toVnum)]) {
                        state.currentFloor = f;
                        break;
                    }
                }
            } else {
                // Same zone, find floor with this room
                const zone = state.allZones[state.currentZone];
                const floorIds = Object.keys(zone.floors).map(k => parseInt(k));
                for (const f of floorIds) {
                    if (zone.floors[String(f)].rooms[String(toVnum)]) {
                        state.currentFloor = f;
                        break;
                    }
                }
            }

            state.selectedRoom = toVnum;
            activateStackRoom(toVnum, state.currentZone, state.currentFloor);
            state.isInPortal = false;
            state.portalHistory = [];
            centerOnRoom(toVnum);
            render();
        }

        async function navigateCrossZone(toVnum, toZone) {
            NAV_pushHistory();
            // Load the destination zone if not already loaded
            document.getElementById('mapTitle').textContent = `Loading ${toZone}…`;
            const data = await loadZoneData(toZone);
            if (!data) {
                document.getElementById('mapTitle').textContent = `Failed to load ${toZone}`;
                return;
            }

            // Find which floor contains the destination room - iterate actual floor IDs
            let destFloor = 0;
            const floorIds = Object.keys(data.floors).map(k => parseInt(k));
            for (const f of floorIds) {
                if (data.floors[String(f)].rooms[String(toVnum)]) {
                    destFloor = f;
                    break;
                }
            }

            // Update zone dropdown to reflect new zone
            const dropdown = document.getElementById('zoneDropdown');
            if (dropdown) dropdown.value = toZone;

            state.currentZone  = toZone;
            state.currentFloor = destFloor;
            state.selectedRoom = toVnum;
            state.isInPortal   = false;
            state.portalHistory = [];
            // Reset zoom/pan but center on the actual destination vnum,
            // not the floor entry_vnum (which resetView(true) would use).
            state.zoom = 1.0;
            state.panX = 0;
            state.panY = 0;
            updateZoomLevel();
            centerOnRoom(toVnum);
            render();
        }

        async function navigateToPortal(fromVnum, toVnum, exitDir) {
            const isGoPortal = exitDir.toLowerCase().startsWith('go');

            if (isGoPortal) {
                // Pre-load the destination zones for all of the portal room's onward exits
                // so the dummy node name is available immediately on the first visit.
                const zone = state.allZones[state.currentZone];
                if (zone) {
                    let portalRoom = null;
                    for (const f of Object.values(zone.floors)) {
                        if (f.rooms[String(toVnum)]) { portalRoom = f.rooms[String(toVnum)]; break; }
                    }
                    if (portalRoom) {
                        const loads = Object.values(portalRoom.exits || {})
                            .filter(ex => ex.to_vnum !== fromVnum && !state.allZones[ex.to_zone])
                            .map(ex => loadZoneData(ex.to_zone));
                        if (loads.length) await Promise.all(loads);
                    }
                }

                // "go X" portals: show an isolated mini-view, don't touch the main map.
                state.goPortalView = { sourceVnum: fromVnum, portalVnum: toVnum, direction: exitDir };
                render();
                return;
            }

            // u/d portals: switch floors within the same zone (existing behaviour).
            const zone = state.allZones[state.currentZone];
            
            // Find which floor the destination room is on - iterate actual floor IDs
            let destFloor = 0;
            const floorIds = Object.keys(zone.floors).map(k => parseInt(k));
            for (const f of floorIds) {
                if (zone.floors[String(f)].rooms[String(toVnum)]) {
                    destFloor = f;
                    break;
                }
            }

            // Save to history: where we came from
            state.portalHistory.push({
                zone: state.currentZone,
                room: fromVnum,
                floor: state.currentFloor,
                exitDir: exitDir
            });

            // Navigate to portal room
            state.selectedRoom = toVnum;
            state.currentFloor = destFloor;
            state.isInPortal = true;
            centerOnRoom(toVnum);
            render();
        }

        function exitGoPortalView() {
            // Return from go-portal mini-view back to the main map.
            state.goPortalView = null;
            render();
        }

        function enterWarpPocket(pocketId, sourceVnum) {
            state.warpPocketView = { pocketId, sourceVnum, sourceFloor: state.currentFloor };
            state.selectedRoom   = null;
            state.panX = 0; state.panY = 0; state.zoom = 1.0;
            updateZoomLevel();
            render();
        }

        function exitWarpPocket() {
            const { sourceVnum, sourceFloor } = state.warpPocketView;
            state.warpPocketView = null;
            state.currentFloor   = sourceFloor;
            state.selectedRoom   = sourceVnum;
            state.panX = 0; state.panY = 0; state.zoom = 1.0;
            updateZoomLevel();
            centerOnRoom(sourceVnum);
            render();
        }

        function returnFromPortal() {
            // Return to previous room via Return button
            if (state.portalHistory.length === 0) return;
            
            const prev = state.portalHistory.pop();
            state.currentZone = prev.zone;
            state.currentFloor = prev.floor;
            state.selectedRoom = prev.room;
            state.isInPortal = state.portalHistory.length > 0;
            centerOnRoom(prev.room);
            render();
        }
        function switchFloor(floor) {
            state.currentFloor = floor;
            state.selectedRoom = null;
            state.goPortalView = null;
            resetView(true);
            render();
        }

        // ============================================================================
        // Rendering
        // ============================================================================

        function render() {
            updateSidebar();
            updateBreadcrumb();
            renderMap();
        }

        function edgeColor(dir) {
            if (dir === 'n' || dir === 's') return '#e05555';
            if (dir === 'e' || dir === 'w') return '#5588e0';
            if (dir === 'u' || dir === 'd') return '#44cc88';
            return '#e0cc44'; // diagonal / named exit
        }

        // Draw a small filled arrowhead at (x,y) pointing along `angle` (radians).
        // Used to mark the direction of travel on one-way exit lines.
        function drawArrowHead(parent, x, y, angle, color) {
            const size = 8, spread = 0.45;
            const pts = [
                [x, y],
                [x - size * Math.cos(angle - spread), y - size * Math.sin(angle - spread)],
                [x - size * Math.cos(angle + spread), y - size * Math.sin(angle + spread)],
            ].map(p => p.join(',')).join(' ');
            const tri = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            tri.setAttribute('points', pts);
            tri.setAttribute('fill', color);
            tri.setAttribute('opacity', '0.95');
            parent.appendChild(tri);
        }

        // Returns the set of vnums that are ONLY reachable via go-portal exits on this floor.
        // These rooms are hidden on the main map and shown only in the mini portal-view.
        function getGoPortalTargetVnums(floor) {
            const rooms = floor.rooms;
            // Build set of vnums reachable via non-portal exits on this floor
            const reachableByCardinal = new Set();
            Object.values(rooms).forEach(room => {
                Object.values(room.exits || {}).forEach(ex => {
                    if (!ex.is_portal && !ex.is_cross_zone) {
                        reachableByCardinal.add(ex.to_vnum);
                    }
                });
            });
            // A go-portal target is: present on this floor, NOT reachable by any cardinal exit
            // AND some room on this floor has a go-portal exit pointing to it
            const goPortalTargets = new Set();
            Object.values(rooms).forEach(room => {
                Object.values(room.exits || {}).forEach(ex => {
                    if (ex.is_portal && ex.direction && ex.direction.toLowerCase().startsWith('go')) {
                        if (rooms[String(ex.to_vnum)] && !reachableByCardinal.has(ex.to_vnum)) {
                            goPortalTargets.add(ex.to_vnum);
                        }
                    }
                });
            });
            return goPortalTargets;
        }

        // Renders the isolated portal mini-view.
        // Layout: Fountain (active, right) with its first onward exit as a dimmed
        // dummy node above it — matching the fountain.png reference.
        // The sourceVnum is never drawn; it's only used to filter the back-exit in the sidebar.
        function renderGoPortalView() {
            const { sourceVnum, portalVnum } = state.goPortalView;
            const zone = state.allZones[state.currentZone];
            if (!zone) return;

            // Find the floor containing the portal room
            let floor = null;
            for (const f of Object.values(zone.floors)) {
                if (f.rooms[String(portalVnum)]) { floor = f; break; }
            }
            if (!floor) return;

            const portalRoom = floor.rooms[String(portalVnum)];
            if (!portalRoom) return;

            // Pick the first onward exit from the portal room (excluding back to sourceVnum)
            const EXIT_ORDER = ['u','d','n','ne','nw','e','w','se','sw','s'];
            const onwardExits = Object.entries(portalRoom.exits || {})
                .filter(([, ex]) => ex.to_vnum !== sourceVnum)
                .sort(([a], [b]) => {
                    const ai = EXIT_ORDER.indexOf(a.toLowerCase());
                    const bi = EXIT_ORDER.indexOf(b.toLowerCase());
                    if (ai === -1 && bi === -1) return a.localeCompare(b);
                    if (ai === -1) return 1; if (bi === -1) return -1;
                    return ai - bi;
                });

            // The dummy node: first onward exit destination (may be null if portal is a dead-end)
            const firstExit = onwardExits.length > 0 ? onwardExits[0] : null;
            let dummyRoom = null;
            let dummyDir  = null;
            if (firstExit) {
                const [dir, ex] = firstExit;
                dummyDir = dir;
                // Try to find the room object for the name label
                const destZone = state.allZones[ex.to_zone];
                dummyRoom = destZone ? getRoom(destZone, ex.to_vnum) : null;
                // Fallback name if zone not loaded yet
                if (!dummyRoom) dummyRoom = { name: ex.is_cross_zone ? ex.to_zone : `#${ex.to_vnum}` };
            }

            const svg = document.getElementById('mapSvg');
            const container = svg.parentElement;
            const W = container.clientWidth  || 800;
            const H = container.clientHeight || 600;

            svg.setAttribute('width',  W);
            svg.setAttribute('height', H);
            svg.innerHTML = '';

            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

            // Portal room centered in the canvas
            const porX = (W - ROOM_WIDTH) / 2;
            const porY = (H - ROOM_HEIGHT) / 2;

            // Dummy node: above the portal room, separated by GRID_STEP_Y
            const gap = GRID_STEP_Y;
            const dumX = porX;
            const dumY = porY - gap;

            // Helper: draw a room box
            function drawMiniRoom(x, y, room, dimmed) {
                const grp = document.createElementNS('http://www.w3.org/2000/svg', 'g');

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', x); rect.setAttribute('y', y);
                rect.setAttribute('width', ROOM_WIDTH); rect.setAttribute('height', ROOM_HEIGHT);
                rect.setAttribute('rx', '4');
                rect.setAttribute('fill',         dimmed ? '#1e2535' : '#1a6b9a');
                rect.setAttribute('stroke',       dimmed ? '#555'    : '#00ccff');
                rect.setAttribute('stroke-width', dimmed ? '1'       : '2');
                grp.appendChild(rect);

                const cx = x + ROOM_WIDTH / 2;
                const words = room.name.split(' ');
                let ln1 = '', ln2 = '';
                for (const w of words) {
                    if ((ln1 + ' ' + w).trim().length <= 14) ln1 = (ln1 + ' ' + w).trim();
                    else if (!ln2) ln2 = w;
                    else if ((ln2 + ' ' + w).length <= 14) ln2 = (ln2 + ' ' + w).trim();
                }
                if (ln2) {
                    [[ln1, -8],[ln2, 8]].forEach(([txt, dy]) => {
                        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        t.setAttribute('x', cx); t.setAttribute('y', y + ROOM_HEIGHT/2 + dy);
                        t.setAttribute('class', 'room-text'); t.setAttribute('pointer-events','none');
                        t.setAttribute('fill', dimmed ? '#888' : '#fff');
                        t.textContent = txt; grp.appendChild(t);
                    });
                } else {
                    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    t.setAttribute('x', cx); t.setAttribute('y', y + ROOM_HEIGHT/2 + 4);
                    t.setAttribute('class', 'room-text'); t.setAttribute('pointer-events','none');
                    t.setAttribute('fill', dimmed ? '#888' : '#fff');
                    t.textContent = room.name.length <= 16 ? room.name : room.name.substring(0,15) + '…';
                    grp.appendChild(t);
                }
                return grp;
            }

            // Draw dummy node and edge only if there's an onward exit
            if (dummyRoom) {
                // Dashed edge from portal room up to dummy node
                const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                ln.setAttribute('x1', porX + ROOM_WIDTH / 2); ln.setAttribute('y1', porY);
                ln.setAttribute('x2', dumX + ROOM_WIDTH / 2); ln.setAttribute('y2', dumY + ROOM_HEIGHT);
                ln.setAttribute('stroke', '#e0cc44'); ln.setAttribute('stroke-width', '2');
                ln.setAttribute('stroke-opacity', '0.7'); ln.setAttribute('stroke-dasharray', '6 3');
                g.appendChild(ln);

                // Direction label on the edge
                const lbX = porX + ROOM_WIDTH / 2 + 8;
                const lbY = porY - gap / 2;
                const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                lbl.setAttribute('x', lbX); lbl.setAttribute('y', lbY);
                lbl.setAttribute('font-size', '11'); lbl.setAttribute('fill', '#e0cc44');
                lbl.setAttribute('pointer-events', 'none');
                lbl.textContent = dummyDir;
                g.appendChild(lbl);

                g.appendChild(drawMiniRoom(dumX, dumY, dummyRoom, true));
            }

            // Portal room (active)
            g.appendChild(drawMiniRoom(porX, porY, portalRoom, false));

            svg.appendChild(g);
        }

        function renderWarpPocketView() {
            const { pocketId, sourceVnum, sourceFloor } = state.warpPocketView;
            const zone = state.allZones[state.currentZone];
            if (!zone) return;
            const floor = zone.floors[String(sourceFloor)];
            if (!floor) return;
            const pocket = (floor.warped_pockets || []).find(wp => wp.id === pocketId);
            if (!pocket) return;

            const pocketSet = new Set(pocket.rooms);
            const pocketPos = pocket.pocket_positions;
            const pb = pocket.bounds;

            const svg = document.getElementById('mapSvg');
            const container = svg.parentElement;
            const W = container.clientWidth  || 800;
            const H = container.clientHeight || 600;
            svg.setAttribute('width', W);
            svg.setAttribute('height', H);
            svg.innerHTML = '';

            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
            marker.setAttribute('id','arrow-oneway'); marker.setAttribute('viewBox','0 0 8 8');
            marker.setAttribute('refX','6'); marker.setAttribute('refY','4');
            marker.setAttribute('markerWidth','5'); marker.setAttribute('markerHeight','5');
            marker.setAttribute('orient','auto');
            const ap = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            ap.setAttribute('d','M0,0 L8,4 L0,8 Z');
            ap.setAttribute('fill','var(--gold,#c8a84b)'); ap.setAttribute('opacity','0.85');
            marker.appendChild(ap); defs.appendChild(marker); svg.appendChild(defs);

            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('id','zoomPanGroup');
            g.setAttribute('transform', `translate(${state.panX},${state.panY}) scale(${state.zoom})`);

            const originX = PADDING - pb.min_x * GRID_STEP_X;
            const originY = PADDING - pb.min_y * GRID_STEP_Y;

            // Track drawn edges to avoid duplicates
            const _drawnEdges = new Set();

            // ── Draw internal edges ───────────────────────────────────────
            pocket.rooms.forEach(vnum => {
                const room = floor.rooms[String(vnum)];
                if (!room) return;
                const pos = pocketPos[String(vnum)];
                if (!pos) return;
                Object.entries(room.exits || {}).forEach(([dir, ex]) => {
                    if (!pocketSet.has(ex.to_vnum)) return;
                    const edgeKey = [Math.min(vnum, ex.to_vnum), Math.max(vnum, ex.to_vnum)].join('-');
                    if (_drawnEdges.has(edgeKey)) return;
                    _drawnEdges.add(edgeKey);
                    const destPos = pocketPos[String(ex.to_vnum)];
                    if (!destPos) return;
                    const x1 = originX + pos[0]     * GRID_STEP_X + ROOM_WIDTH  / 2;
                    const y1 = originY + pos[1]     * GRID_STEP_Y + ROOM_HEIGHT / 2;
                    const x2 = originX + destPos[0] * GRID_STEP_X + ROOM_WIDTH  / 2;
                    const y2 = originY + destPos[1] * GRID_STEP_Y + ROOM_HEIGHT / 2;
                    const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    ln.setAttribute('x1',x1); ln.setAttribute('y1',y1);
                    ln.setAttribute('x2',x2); ln.setAttribute('y2',y2);
                    ln.setAttribute('stroke', edgeColor(dir));
                    ln.setAttribute('stroke-width','2');
                    ln.setAttribute('stroke-opacity','0.7');
                    g.appendChild(ln);
                });
            });

            // ── Draw pocket rooms ─────────────────────────────────────────
            pocket.rooms.forEach(vnum => {
                const room = floor.rooms[String(vnum)];
                if (!room) return;
                const pos = pocketPos[String(vnum)];
                if (!pos) return;
                const px = originX + pos[0] * GRID_STEP_X;
                const py = originY + pos[1] * GRID_STEP_Y;
                const cx = px + ROOM_WIDTH / 2;
                const cy = py + ROOM_HEIGHT / 2;

                const isSelected  = state.selectedRoom === vnum;
                const isPortalOut = pocket.portals_out.some(p => p.pocket_vnum === vnum);

                const grp = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                grp.style.cursor = 'pointer';
                grp.onclick = () => {
                    state.selectedRoom = vnum;
                    if (isPortalOut) { exitWarpPocket(); return; }
                    render();
                };

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', px); rect.setAttribute('y', py);
                rect.setAttribute('width', ROOM_WIDTH); rect.setAttribute('height', ROOM_HEIGHT);
                rect.setAttribute('rx', '6');
                rect.setAttribute('class', `room-box${isSelected ? ' selected' : ''}`);
                if (isPortalOut) {
                    rect.setAttribute('stroke', '#e0cc44');
                    rect.setAttribute('stroke-width', '2.5');
                }
                grp.appendChild(rect);

                // Room name
                const words = room.name.split(' ');
                let ln1 = '', ln2 = '';
                for (const w of words) {
                    if ((ln1+' '+w).trim().length <= 14) ln1 = (ln1+' '+w).trim();
                    else if (!ln2) ln2 = w;
                    else if ((ln2+' '+w).length <= 14) ln2 = (ln2+' '+w).trim();
                }
                const textClass = `room-text${isSelected ? ' selected-text' : ''}`;
                if (ln2) {
                    [[ln1,-8],[ln2,8]].forEach(([txt,dy]) => {
                        const t = document.createElementNS('http://www.w3.org/2000/svg','text');
                        t.setAttribute('x',cx); t.setAttribute('y',cy+dy);
                        t.setAttribute('class',textClass); t.setAttribute('pointer-events','none');
                        t.textContent = txt; grp.appendChild(t);
                    });
                } else {
                    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
                    t.setAttribute('x',cx); t.setAttribute('y',cy+4);
                    t.setAttribute('class',textClass); t.setAttribute('pointer-events','none');
                    t.textContent = ln1; grp.appendChild(t);
                }

                // ≋ badge on portal_out rooms (stub toward exit direction)
                if (isPortalOut) {
                    const pout = pocket.portals_out.find(p => p.pocket_vnum === vnum);
                    if (pout) {
                        const FACE = {n:[0,-ROOM_HEIGHT/2],s:[0,ROOM_HEIGHT/2],e:[ROOM_WIDTH/2,0],w:[-ROOM_WIDTH/2,0],
                            ne:[ROOM_WIDTH/2,-ROOM_HEIGHT/2],nw:[-ROOM_WIDTH/2,-ROOM_HEIGHT/2],se:[ROOM_WIDTH/2,ROOM_HEIGHT/2],sw:[-ROOM_WIDTH/2,ROOM_HEIGHT/2]};
                        const ff = FACE[pout.direction] || [0,0];
                        const bx = cx + ff[0] + (ff[0] < 0 ? -20 : ff[0] > 0 ? 20 : 0);
                        const by = cy + ff[1] + (ff[1] < 0 ? -20 : ff[1] > 0 ? 20 : 0);
                        const wbg = document.createElementNS('http://www.w3.org/2000/svg','circle');
                        wbg.setAttribute('cx',bx); wbg.setAttribute('cy',by); wbg.setAttribute('r','10');
                        wbg.setAttribute('fill','#1a2535'); wbg.setAttribute('stroke','#e0cc44'); wbg.setAttribute('stroke-width','1.5');
                        const wtxt = document.createElementNS('http://www.w3.org/2000/svg','text');
                        wtxt.setAttribute('x',bx); wtxt.setAttribute('y',by+4);
                        wtxt.setAttribute('text-anchor','middle'); wtxt.setAttribute('font-size','11');
                        wtxt.setAttribute('fill','#e0cc44'); wtxt.setAttribute('pointer-events','none');
                        wtxt.textContent = '≋';
                        const wtip = document.createElementNS('http://www.w3.org/2000/svg','title');
                        wtip.textContent = `Return to main map [${pout.direction.toUpperCase()}]`;
                        grp.appendChild(wbg); grp.appendChild(wtxt); grp.appendChild(wtip);
                    }
                }

                g.appendChild(grp);
            });

            svg.appendChild(g);
            document.getElementById('mapTitle').textContent = `≋ Warped Space — ${state.currentZone}`;
            document.getElementById('roomCount').textContent = `${pocket.rooms.length} rooms`;
            document.getElementById('noRooms').style.display = 'none';
        }

        function toggleDetached() {
            state.showDetached = !state.showDetached;
            const btn = document.getElementById('detachedBtn');
            if (btn) {
                btn.style.background = state.showDetached ? 'var(--accent)' : 'var(--bg-card)';
                btn.style.color      = state.showDetached ? '#000' : 'var(--text-muted)';
                btn.style.borderColor = state.showDetached ? 'var(--accent)' : 'var(--border)';
            }
            render();
        }

        function renderMap() {
            const zone = state.allZones[state.currentZone];
            if (!zone) return;

            const floor = zone.floors[String(state.currentFloor)];
            if (!floor) return;

            const svg = document.getElementById('mapSvg');
            // Detached rooms (not cardinally connected to this floor's main
            // cluster) are hidden unless the "Detached rooms" toggle is on —
            // EXCEPT the detached component containing the selected room:
            // traversing into a detached group auto-reveals the whole group
            // (with its internal edges), and traversing back out re-hides it.
            const revealSet = new Set();
            const _selKey = String(state.selectedRoom);
            if (!state.showDetached && floor.rooms[_selKey] && floor.rooms[_selKey].detached) {
                const _CARD = new Set(['n','s','e','w','ne','nw','se','sw']);
                const _stack = [_selKey];
                revealSet.add(_selKey);
                while (_stack.length) {
                    const r = floor.rooms[_stack.pop()];
                    if (!r) continue;
                    for (const [dir, ex] of Object.entries(r.exits || {})) {
                        if (!_CARD.has(dir) || ex.is_portal) continue;
                        const t = String(ex.to_vnum);
                        const tr = floor.rooms[t];
                        if (tr && tr.detached && !revealSet.has(t)) { revealSet.add(t); _stack.push(t); }
                    }
                }
            }
            const rooms = state.showDetached
                ? floor.rooms
                : Object.fromEntries(
                    Object.entries(floor.rooms).filter(
                        ([k, r]) => !r.detached || revealSet.has(k)));

            const b = floor.metadata;
            const originX = PADDING - b.min_x * GRID_STEP_X;
            const originY = PADDING - b.min_y * GRID_STEP_Y;
            const width   = (b.max_x - b.min_x + 2) * GRID_STEP_X + 2 * PADDING;
            const height  = (b.max_y - b.min_y + 2) * GRID_STEP_Y + 2 * PADDING;

            // Size SVG to the VIEWPORT (container), not the map content.
            // If we size it to the map content, rooms can be panned outside the SVG
            // element boundary and get clipped by the container's overflow:hidden.
            const container = svg.parentElement;
            svg.setAttribute('width',  container.clientWidth  || width);
            svg.setAttribute('height', container.clientHeight || height);
            svg.innerHTML = '';

            // ── zoom/pan group ────────────────────────────────────────────
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('id', 'zoomPanGroup');
            g.setAttribute('transform',
                `translate(${state.panX}, ${state.panY}) scale(${state.zoom})`);

            const floorEdges = (zone.edges || []).filter(e => e.floor === state.currentFloor);
            const chains = floor.chains || {};

            const roomNpcNums = {};
            buildUniqueNpcIndex(zone).forEach(e => {
                if (!roomNpcNums[e.roomVnum]) roomNpcNums[e.roomVnum] = [];
                roomNpcNums[e.roomVnum].push(e.idx);
            });

            // DEV: store origin for drag coordinate conversion (remove before live)
            DEV_originX = originX; DEV_originY = originY;

            // ── Pixel-centre lookup (accounts for sub_x / sub_y offsets) ──
            const roomPixel = {};
            Object.entries(rooms).forEach(([vnumStr, room]) => {
                const ov = state.posEditMode && state.posOverrides[vnumStr];
                const gx = ov ? ov.gx : room.grid_x;
                const gy = ov ? ov.gy : room.grid_y;
                const px = originX + gx * GRID_STEP_X + (room.sub_x || 0) * SUB_PX;
                const py = originY + gy * GRID_STEP_Y + (room.sub_y || 0) * SUB_PX;
                roomPixel[vnumStr] = { px, py, cx: px + ROOM_WIDTH / 2, cy: py + ROOM_HEIGHT / 2 };
            });

            // ── Cross-zone ghost nodes ────────────────────────────────────
            const DDELTA_R = {n:[0,-1],s:[0,1],e:[1,0],w:[-1,0],ne:[1,-1],nw:[-1,-1],se:[1,1],sw:[-1,1],
                fore:[0,-1],aft:[0,1],port:[-1,0],starboard:[1,0],fo:[0,-1],af:[0,1],po:[-1,0],sb:[1,0]};
            const realPositions = new Set(Object.values(rooms).map(r => `${r.grid_x},${r.grid_y}`));
            const ghostNodes = {};
            Object.values(rooms).forEach(room => {
                Object.values(room.exits || {}).forEach(ex => {
                    if (!ex.is_cross_zone || ex.is_portal) return;
                    const delta = DDELTA_R[ex.direction.toLowerCase()];
                    if (!delta) return;
                    const gx = room.grid_x + delta[0];
                    const gy = room.grid_y + delta[1];
                    const key = `${gx},${gy}`;
                    if (realPositions.has(key) || ghostNodes[key]) return;
                    ghostNodes[key] = { gx, gy, vnum: ex.to_vnum, zone: ex.to_zone,
                        name: ex.to_room_name || ex.to_zone, srcGx: room.grid_x, srcGy: room.grid_y };
                });
            });

            // ── Draw edges ────────────────────────────────────────────────
            // Override-aware cell lookup so we can detect an edge running along a
            // shared row/column THROUGH intervening rooms (those get bowed out so
            // the line doesn't pass over the rooms it skips).
            const _cellOf = {}; const _cellSet = new Set();
            Object.entries(rooms).forEach(([vs, room]) => {
                const ov = state.posEditMode && state.posOverrides[vs];
                const gx = ov ? ov.gx : room.grid_x;
                const gy = ov ? ov.gy : room.grid_y;
                _cellOf[vs] = { gx, gy };
                _cellSet.add(`${gx},${gy}`);
            });

            floorEdges.forEach(edge => {
                const fromP = roomPixel[String(edge.from)];
                const toP   = roomPixel[String(edge.to)];
                if (!fromP || !toP) return;
                const fromRoom = rooms[String(edge.from)];
                const toRoom   = rooms[String(edge.to)];
                const fromChain = fromRoom ? fromRoom.chain_id : null;
                const toChain   = toRoom   ? toRoom.chain_id   : null;
                // Use chain color when both endpoints share a colliding chain
                const chainColor = (fromChain != null && fromChain === toChain && chains[fromChain])
                    ? chains[fromChain]
                    : edgeColor(edge.direction);

                const x1 = fromP.cx, y1 = fromP.cy, x2 = toP.cx, y2 = toP.cy;

                // Skip detection: same row/column with a room sitting between.
                let skips = false;
                const a = _cellOf[String(edge.from)], b = _cellOf[String(edge.to)];
                if (a && b) {
                    if (a.gy === b.gy && Math.abs(a.gx - b.gx) > 1) {
                        const lo = Math.min(a.gx, b.gx), hi = Math.max(a.gx, b.gx);
                        for (let gx = lo + 1; gx < hi; gx++)
                            if (_cellSet.has(`${gx},${a.gy}`)) { skips = true; break; }
                    } else if (a.gx === b.gx && Math.abs(a.gy - b.gy) > 1) {
                        const lo = Math.min(a.gy, b.gy), hi = Math.max(a.gy, b.gy);
                        for (let gy = lo + 1; gy < hi; gy++)
                            if (_cellSet.has(`${a.gx},${gy}`)) { skips = true; break; }
                    }
                }

                // One-way detection (orientation-independent): which side owns the exit?
                const aToB = fromRoom && Object.values(fromRoom.exits || {})
                    .some(ex => String(ex.to_vnum) === String(edge.to));
                const bToA = toRoom && Object.values(toRoom.exits || {})
                    .some(ex => String(ex.to_vnum) === String(edge.from));
                let arrowDir = 0;                 // +1 toward edge.to, -1 toward edge.from
                if (aToB && !bToA) arrowDir = 1;
                else if (bToA && !aToB) arrowDir = -1;

                // Perpendicular bow control point for the curved detour.
                const dx = x2 - x1, dy = y2 - y1, len = Math.hypot(dx, dy) || 1;
                const span = (a && b) ? Math.max(Math.abs(a.gx - b.gx), Math.abs(a.gy - b.gy)) : 1;
                const bow  = skips ? Math.min(26 + span * 6, 70) : 0;
                const nx = -dy / len, ny = dx / len;                 // unit perpendicular
                const cxp = (x1 + x2) / 2 + nx * bow;
                const cyp = (y1 + y2) / 2 + ny * bow;

                if (skips) {
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', `M${x1},${y1} Q${cxp},${cyp} ${x2},${y2}`);
                    path.setAttribute('fill', 'none');
                    path.setAttribute('stroke', chainColor);
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('stroke-opacity', '0.85');
                    g.appendChild(path);
                } else {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
                    line.setAttribute('stroke', chainColor);
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('stroke-opacity', '0.85');
                    g.appendChild(line);
                }

                // One-way arrow at ~62% along the edge, pointing in the travel direction.
                if (arrowDir !== 0) {
                    const t = 0.62;
                    let ax, ay, ang;
                    if (skips) {
                        const mt = 1 - t;
                        ax = mt*mt*x1 + 2*mt*t*cxp + t*t*x2;
                        ay = mt*mt*y1 + 2*mt*t*cyp + t*t*y2;
                        ang = Math.atan2(2*mt*(cyp - y1) + 2*t*(y2 - cyp),
                                         2*mt*(cxp - x1) + 2*t*(x2 - cxp));
                    } else {
                        ax = x1 + (x2 - x1) * t;
                        ay = y1 + (y2 - y1) * t;
                        ang = Math.atan2(y2 - y1, x2 - x1);
                    }
                    if (arrowDir === -1) ang += Math.PI;   // points toward edge.from
                    drawArrowHead(g, ax, ay, ang, chainColor);
                }
            });

            // ── Triage overlay: highlight diagonal/one-way cardinal exits ──
            if (state.triageMode) {
                const _ti = TRIAGE_computeIssues(floor);
                // Glow rings behind problem rooms (drawn before rooms so rooms sit on top)
                const _badRooms = new Set([
                    ..._ti.diagonals.flatMap(i => [i.from, i.to]),
                    ..._ti.oneways.map(i => i.from),
                ]);
                _badRooms.forEach(vnum => {
                    const p = roomPixel[String(vnum)];
                    if (!p) return;
                    const glow = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    glow.setAttribute('x', p.px - 4); glow.setAttribute('y', p.py - 4);
                    glow.setAttribute('width', ROOM_WIDTH + 8); glow.setAttribute('height', ROOM_HEIGHT + 8);
                    glow.setAttribute('rx', '8');
                    glow.setAttribute('fill', 'none');
                    glow.setAttribute('stroke', '#e040fb');
                    glow.setAttribute('stroke-width', '2.5');
                    glow.setAttribute('stroke-opacity', '0.55');
                    glow.setAttribute('pointer-events', 'none');
                    g.appendChild(glow);
                });
                // Diagonal exit highlight lines (drawn on top of normal edges)
                _ti.diagonals.forEach(({from, dir, to}) => {
                    const fromP = roomPixel[String(from)];
                    const toP   = roomPixel[String(to)];
                    if (!fromP || !toP) return;
                    const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    ln.setAttribute('x1', fromP.cx); ln.setAttribute('y1', fromP.cy);
                    ln.setAttribute('x2', toP.cx);   ln.setAttribute('y2', toP.cy);
                    ln.setAttribute('stroke', '#e040fb');
                    ln.setAttribute('stroke-width', '3.5');
                    ln.setAttribute('stroke-opacity', '0.9');
                    ln.setAttribute('stroke-dasharray', '9 4');
                    ln.setAttribute('pointer-events', 'none');
                    g.appendChild(ln);
                });
                // One-way exit highlight lines
                _ti.oneways.forEach(({from, dir, to}) => {
                    const fromP = roomPixel[String(from)];
                    const toP   = roomPixel[String(to)];
                    if (!fromP || !toP) return;
                    const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    ln.setAttribute('x1', fromP.cx); ln.setAttribute('y1', fromP.cy);
                    ln.setAttribute('x2', toP.cx);   ln.setAttribute('y2', toP.cy);
                    ln.setAttribute('stroke', '#ff9800');
                    ln.setAttribute('stroke-width', '2.5');
                    ln.setAttribute('stroke-opacity', '0.8');
                    ln.setAttribute('stroke-dasharray', '5 3');
                    ln.setAttribute('pointer-events', 'none');
                    g.appendChild(ln);
                });
                // One-way U/D badge on rooms with missing floor link
                _ti.ud_oneways.forEach(({from, dir}) => {
                    const p = roomPixel[String(from)];
                    if (!p) return;
                    const badge = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    badge.setAttribute('cx', dir === 'u' ? p.px + ROOM_WIDTH - 4 : p.px + 4);
                    badge.setAttribute('cy', dir === 'u' ? p.py : p.py + ROOM_HEIGHT);
                    badge.setAttribute('r', '5');
                    badge.setAttribute('fill', '#1a3020');
                    badge.setAttribute('stroke', '#ff9800');
                    badge.setAttribute('stroke-width', '1.5');
                    badge.setAttribute('pointer-events', 'none');
                    g.appendChild(badge);
                });
            }

            // ── Ghost edges + nodes for cross-zone exits ──────────────────
            Object.values(ghostNodes).forEach(ghost => {
                const x1 = originX + ghost.srcGx * GRID_STEP_X + ROOM_WIDTH / 2;
                const y1 = originY + ghost.srcGy * GRID_STEP_Y + ROOM_HEIGHT / 2;
                const x2 = originX + ghost.gx   * GRID_STEP_X + ROOM_WIDTH / 2;
                const y2 = originY + ghost.gy   * GRID_STEP_Y + ROOM_HEIGHT / 2;
                const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                ln.setAttribute('x1', x1); ln.setAttribute('y1', y1);
                ln.setAttribute('x2', x2); ln.setAttribute('y2', y2);
                ln.setAttribute('stroke', 'var(--gold)'); ln.setAttribute('stroke-width', '1.5');
                ln.setAttribute('stroke-opacity', '0.5'); ln.setAttribute('stroke-dasharray', '6 3');
                g.appendChild(ln);

                const gpx = originX + ghost.gx * GRID_STEP_X;
                const gpy = originY + ghost.gy * GRID_STEP_Y;
                const gcx = gpx + ROOM_WIDTH / 2;
                const grpG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                grpG.style.cursor = 'pointer';
                grpG.onclick = () => navigateCrossZone(ghost.vnum, ghost.zone);
                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', gpx); rect.setAttribute('y', gpy);
                rect.setAttribute('width', ROOM_WIDTH); rect.setAttribute('height', ROOM_HEIGHT);
                rect.setAttribute('rx', '6'); rect.setAttribute('fill', 'var(--gold-dim)');
                rect.setAttribute('stroke', 'var(--gold)'); rect.setAttribute('stroke-width', '1');
                rect.setAttribute('stroke-dasharray', '4 3'); rect.setAttribute('opacity', '0.75');
                grpG.appendChild(rect);
                const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                t.setAttribute('x', gcx); t.setAttribute('y', gpy + ROOM_HEIGHT / 2 + 4);
                t.setAttribute('class', 'room-text'); t.setAttribute('pointer-events', 'none');
                t.setAttribute('fill', 'var(--gold)'); t.setAttribute('opacity', '0.85');
                t.textContent = ghost.zone.length <= 16 ? ghost.zone : ghost.zone.substring(0, 15) + '…';
                grpG.appendChild(t);
                const tip = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                tip.textContent = `${ghost.name} — ${ghost.zone}`;
                grpG.appendChild(tip);
                g.appendChild(grpG);
            });

            // ── Draw rooms ────────────────────────────────────────────────
            Object.entries(rooms).forEach(([vnumStr, room]) => {
                const vnum = parseInt(vnumStr);
                const { px, py, cx, cy } = roomPixel[vnumStr];

                const isEntry    = vnum === floor.entry_vnum;
                const isSelected = vnum === state.selectedRoom;

                const grp = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                grp.style.cursor = state.posEditMode ? 'grab' : 'pointer';
                if (!state.posEditMode) {
                    grp.onclick = () => {
                        // DEV: trace tool — append vnum to chain (remove before live)
                        if (state.traceMode) {
                            state.traceChain.push(vnum);
                            DEV_traceUpdate();
                        }
                        state.selectedRoom = vnum; centerOnRoom(vnum); render();
                    };
                } else {
                    // Edit Positions mode: a click selects the node, a drag moves it.
                    grp.addEventListener('mousedown', e => {
                        e.stopPropagation();
                        const ov = state.posOverrides[String(vnum)];
                        const curGX = ov ? ov.gx : room.grid_x;
                        const curGY = ov ? ov.gy : room.grid_y;
                        const svg = document.getElementById('mapSvg');
                        const r = svg.getBoundingClientRect();
                        const sx = (e.clientX - r.left - state.panX) / state.zoom;
                        const sy = (e.clientY - r.top  - state.panY) / state.zoom;
                        state._roomDrag = {
                            vnum: String(vnum), curGX, curGY,
                            startX: e.clientX, startY: e.clientY, moved: false,
                            // grab offset within the node, so it tracks the cursor
                            // instead of snapping its origin to the pointer
                            grabDX: sx - (DEV_originX + curGX * GRID_STEP_X),
                            grabDY: sy - (DEV_originY + curGY * GRID_STEP_Y),
                        };
                        grp.style.cursor = 'grabbing';
                        e.preventDefault();
                    });
                }

                // Room box
                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', px); rect.setAttribute('y', py);
                rect.setAttribute('width', ROOM_WIDTH); rect.setAttribute('height', ROOM_HEIGHT);
                rect.setAttribute('rx', '4');
                let roomClass = 'room-box';
                if (isEntry)    roomClass += ' entry-room';
                if (isSelected) roomClass += ' selected';
                if (room.detached) roomClass += ' detached';
                rect.setAttribute('class', roomClass);
                const chainColor = chains[room.chain_id];
                if (chainColor && !isSelected && !isEntry && !room.detached) {
                    rect.setAttribute('stroke', chainColor);
                    rect.setAttribute('stroke-width', '1.5');
                }
                grp.appendChild(rect);

                // Exit-type borders: green = has door/portal exit, yellow = has
                // up/down exit, both = green outer + yellow inner. Drawn as separate
                // outlines so they don't fight the box's own stroke.
                const _hasDoor = !!room.portal;
                const _hasUD = Object.keys(room.exits || {}).some(k => {
                    const kl = k.toLowerCase();
                    return kl === 'u' || kl === 'd' || kl === 'up' || kl === 'down';
                });
                function _outline(inset, color, w) {
                    const o = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    o.setAttribute('x', px - inset); o.setAttribute('y', py - inset);
                    o.setAttribute('width', ROOM_WIDTH + inset * 2);
                    o.setAttribute('height', ROOM_HEIGHT + inset * 2);
                    o.setAttribute('rx', '5'); o.setAttribute('fill', 'none');
                    o.setAttribute('stroke', color); o.setAttribute('stroke-width', String(w));
                    o.setAttribute('pointer-events', 'none');
                    grp.appendChild(o);
                }
                if (_hasDoor) _outline(3, '#33cc55', 1.6);
                if (_hasUD)   _outline(1, '#e8c83a', 1.6);
                if (room.death_trap) {
                    _outline(4.5, '#ff2b2b', 2);
                    const sk = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    sk.setAttribute('x', px + ROOM_WIDTH / 2);
                    sk.setAttribute('y', py + ROOM_HEIGHT / 2 + 4);
                    sk.setAttribute('text-anchor', 'middle');
                    sk.setAttribute('font-size', '14');
                    sk.setAttribute('pointer-events', 'none');
                    sk.textContent = '💀';
                    const _sktip = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                    _sktip.textContent = 'Death trap';
                    sk.appendChild(_sktip);
                    grp.appendChild(sk);
                }

                // Vnum label
                const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                t.setAttribute('x', cx); t.setAttribute('y', cy + 4);
                t.setAttribute('text-anchor', 'middle');
                t.setAttribute('dominant-baseline', 'middle');
                t.setAttribute('font-size', '8');
                t.setAttribute('font-family', 'monospace');
                t.setAttribute('fill', isSelected ? '#e8f4ff' : isEntry ? '#a8dfc0' : 'var(--text-primary)');
                t.setAttribute('pointer-events', 'none');
                t.textContent = String(vnum);
                grp.appendChild(t);

                // Spinner-room icon: a swirl in the top-left corner marking rooms
                // that randomise walked-out directions ("dizzy and confused").
                if (room.spinner) {
                    const sp = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    const sx0 = px + 4.5, sy0 = py + 4.5;
                    sp.setAttribute('d',
                        `M ${sx0+3} ${sy0+1.2} a 3 3 0 1 1 -3 3 a 2 2 0 1 1 2 -2 a 1 1 0 1 1 -1 1`);
                    sp.setAttribute('fill', 'none');
                    sp.setAttribute('stroke', '#d98bff');
                    sp.setAttribute('stroke-width', '1.1');
                    sp.setAttribute('stroke-linecap', 'round');
                    sp.setAttribute('pointer-events', 'none');
                    const _sptip = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                    _sptip.textContent = 'Spinner room — randomises the direction you walk out';
                    sp.appendChild(_sptip);
                    grp.appendChild(sp);
                }

                // Portal icon: the door emoji (matching the sidebar) in the
                // top-right corner, ONLY for rooms with a go/enter portal exit
                // (e.g. "go bushes"). Vertical u/d exits use the up/down badges
                // below instead — room.portal already excludes them (exporter).
                if (room.portal) {
                    const dr = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    dr.setAttribute('x', px + ROOM_WIDTH - 6);
                    dr.setAttribute('y', py + 8.5);
                    dr.setAttribute('text-anchor', 'middle');
                    dr.setAttribute('font-size', '9');
                    dr.setAttribute('pointer-events', 'none');
                    dr.textContent = '🚪';
                    const _drtip = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                    _drtip.textContent = 'Portal — this room has a go/enter exit (e.g. go bushes)';
                    dr.appendChild(_drtip);
                    grp.appendChild(dr);
                }

                // Gathering-node icons (bottom-left): ⛏ ore / 🌿 herb / 🐾 hide etc.
                // A room can hold MULTIPLE node types (e.g. an ore AND a herb), so
                // draw one icon per distinct category, left to right along the bottom.
                if (room.nodes && room.nodes.length) {
                    const _cats = [...new Set(room.nodes.map(n => n.category))];
                    _cats.forEach((_cat, _i) => {
                        const nd = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        nd.setAttribute('x', px + 5.5 + _i * 9);
                        nd.setAttribute('y', py + ROOM_HEIGHT - 3);
                        nd.setAttribute('text-anchor', 'middle');
                        nd.setAttribute('font-size', '9');
                        nd.setAttribute('pointer-events', 'none');
                        nd.textContent = nodeIcon(_cat);
                        const _ndtip = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                        _ndtip.textContent = 'Node: ' + room.nodes.map(n => n.name).join(', ');
                        nd.appendChild(_ndtip);
                        grp.appendChild(nd);
                    });
                }

                // Up/down badges (small dots on top/bottom edge)
                // Clicking a badge navigates to the destination room on the other floor.
                // Besides literal u/d exits, a "go"/portal exit that lands on another
                // floor of this zone counts as vertical (e.g. "go bar" down to the
                // Wine Cellar on floor -1) so the node still shows a down icon.
                let upExit = null, downExit = null;
                const _zfloors = (state.allZones[state.currentZone] || {}).floors || {};
                const _floorOf = (v) => {
                    for (const f of Object.keys(_zfloors)) {
                        if (_zfloors[f].rooms[String(v)]) return parseInt(f);
                    }
                    return null;
                };
                for (const [k, ex] of Object.entries(room.exits || {})) {
                    const kl = k.toLowerCase();
                    if (kl === 'u' || kl === 'up') { upExit = upExit || [k, ex]; }
                    else if (kl === 'd' || kl === 'down') { downExit = downExit || [k, ex]; }
                    else if (!ex.is_cross_zone && (ex.is_portal || kl.startsWith('go'))) {
                        const df = _floorOf(ex.to_vnum);
                        if (df === null) continue;
                        if (df > state.currentFloor && !upExit) upExit = [k, ex];
                        else if (df < state.currentFloor && !downExit) downExit = [k, ex];
                    }
                }
                if (upExit) {
                    const upBg = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    upBg.setAttribute('cx', cx); upBg.setAttribute('cy', py);
                    upBg.setAttribute('r', '5'); upBg.setAttribute('fill', 'var(--edge-stair)');
                    upBg.setAttribute('stroke', 'var(--bg-deep)'); upBg.setAttribute('stroke-width', '1');
                    upBg.setAttribute('cursor', 'pointer');
                    upBg.setAttribute('title', `Up → ${upExit[1].to_room_name || upExit[1].to_vnum}`);
                    upBg.addEventListener('click', e => {
                        e.stopPropagation();
                        navigateToRoom(upExit[1].to_vnum, upExit[1].to_zone);
                    });
                    const upTri = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                    upTri.setAttribute('points', `${cx},${py-2.5} ${cx-2},${py+2} ${cx+2},${py+2}`);
                    upTri.setAttribute('fill', '#fff'); upTri.setAttribute('pointer-events', 'none');
                    grp.appendChild(upBg); grp.appendChild(upTri);
                }
                if (downExit) {
                    const by = py + ROOM_HEIGHT;
                    const dnBg = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    dnBg.setAttribute('cx', cx); dnBg.setAttribute('cy', by);
                    dnBg.setAttribute('r', '5'); dnBg.setAttribute('fill', 'var(--edge-stair)');
                    dnBg.setAttribute('stroke', 'var(--bg-deep)'); dnBg.setAttribute('stroke-width', '1');
                    dnBg.setAttribute('cursor', 'pointer');
                    dnBg.setAttribute('title', `Down → ${downExit[1].to_room_name || downExit[1].to_vnum}`);
                    dnBg.addEventListener('click', e => {
                        e.stopPropagation();
                        navigateToRoom(downExit[1].to_vnum, downExit[1].to_zone);
                    });
                    const dnTri = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                    dnTri.setAttribute('points', `${cx},${by+2.5} ${cx-2},${by-2} ${cx+2},${by-2}`);
                    dnTri.setAttribute('fill', '#fff'); dnTri.setAttribute('pointer-events', 'none');
                    grp.appendChild(dnBg); grp.appendChild(dnTri);
                }

                // Cross-floor phantom nodes (see working viewer): a cardinal exit
                // whose destination is on a different floor of this zone draws a
                // small clickable ghost node one cell over with a ↑/↓ arrow.
                const _PHDIR = { n:[0,-1], s:[0,1], e:[1,0], w:[-1,0],
                                 ne:[1,-1], nw:[-1,-1], se:[1,1], sw:[-1,1] };
                for (const [k, ex] of Object.entries(room.exits || {})) {
                    if (!ex.is_cross_floor) continue;
                    const off = _PHDIR[k.toLowerCase()];
                    if (!off) continue;
                    const phx = px + off[0] * GRID_STEP_X * 0.6;
                    const phy = py + off[1] * GRID_STEP_Y * 0.6;
                    const down = (ex.to_floor !== null && ex.to_floor < state.currentFloor);
                    const pg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    pg.setAttribute('cursor', 'pointer');
                    const pr = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    pr.setAttribute('x', phx + ROOM_WIDTH/2 - 9); pr.setAttribute('y', phy + ROOM_HEIGHT/2 - 7);
                    pr.setAttribute('width', '18'); pr.setAttribute('height', '14'); pr.setAttribute('rx', '3');
                    pr.setAttribute('fill', '#1b2433');
                    pr.setAttribute('stroke', 'var(--edge-stair, #44cc88)');
                    pr.setAttribute('stroke-width', '1.2'); pr.setAttribute('stroke-dasharray', '3 2');
                    const pt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    pt.setAttribute('x', phx + ROOM_WIDTH/2); pt.setAttribute('y', phy + ROOM_HEIGHT/2 + 3);
                    pt.setAttribute('text-anchor', 'middle'); pt.setAttribute('font-size', '9');
                    pt.setAttribute('fill', 'var(--edge-stair, #44cc88)'); pt.setAttribute('pointer-events', 'none');
                    pt.textContent = (down ? '▾ ' : '▴ ') + k.toUpperCase();
                    const ptip = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                    ptip.textContent = `${k.toUpperCase()} → ${ex.to_room_name || ex.to_vnum} (floor ${ex.to_floor}) — click to jump`;
                    pg.appendChild(pr); pg.appendChild(pt); pg.appendChild(ptip);
                    pg.addEventListener('click', e => { e.stopPropagation(); navigateToRoom(ex.to_vnum, ex.to_zone); });
                    grp.appendChild(pg);
                }

                g.appendChild(grp);
            });

            svg.appendChild(g);

            document.getElementById('mapTitle').textContent = `${state.currentZone} — Floor ${state.currentFloor}`;
            document.getElementById('roomCount').textContent = `${Object.keys(rooms).length} rooms`;
            document.getElementById('noRooms').style.display = Object.keys(rooms).length === 0 ? 'block' : 'none';
        }

        // ============================================================================
        // Zoom & Pan
        // ============================================================================

        function resetView(forceEntryRoom = false) {
            state.zoom = 1.0;
            state.panX = 0;
            state.panY = 0;
            updateZoomLevel();
            // Center on a room after resetting zoom.
            // forceEntryRoom=true: use the floor's entry_vnum (zone/floor switches).
            // forceEntryRoom=false (default): keep state.selectedRoom so navigation
            //   to a specific room doesn't get overwritten with the floor entry room.
            const zone = state.allZones[state.currentZone];
            if (zone) {
                const floorData = zone.floors[String(state.currentFloor)];
                let targetVnum;
                if (forceEntryRoom) {
                    targetVnum = (floorData && floorData.entry_vnum)
                        ? floorData.entry_vnum
                        : state.selectedRoom;
                    if (targetVnum) state.selectedRoom = targetVnum;
                } else {
                    targetVnum = state.selectedRoom
                        || (floorData && floorData.entry_vnum);
                }
                if (targetVnum) centerOnRoom(targetVnum);
            }
        }

        function centerOnRoom(vnum) {
            const zone = state.allZones[state.currentZone];
            if (!zone) return;
            const floor = zone.floors[String(state.currentFloor)];
            if (!floor || !floor.rooms[String(vnum)]) return;
            const room = floor.rooms[String(vnum)];
            const b = floor.metadata;
            const originX = PADDING - b.min_x * GRID_STEP_X;
            const originY = PADDING - b.min_y * GRID_STEP_Y;

            let roomCenterX, roomCenterY;

            if (room.pocket_id !== undefined) {
                // Pocket room: position within the pocket panel
                const pocket = (floor.warped_pockets || []).find(p => p.id === room.pocket_id);
                if (!pocket) return;
                const _PAD = 16;
                const _pb = pocket.bounds;
                const _pH = (_pb.max_y - _pb.min_y) * GRID_STEP_Y + ROOM_HEIGHT + _PAD * 2 + 24;
                const _allPortals = [...pocket.portals_in, ...pocket.portals_out];
                const _mainVnums = [...new Set(_allPortals.map(p => p.main_vnum))];
                let _cgx = 0, _cgy = 0, _cnt = 0;
                _mainVnums.forEach(v => {
                    const r = floor.rooms[String(v)]; if (r && r.pocket_id === undefined) { _cgx += r.grid_x; _cgy += r.grid_y; _cnt++; }
                });
                if (_cnt > 0) { _cgx /= _cnt; _cgy /= _cnt; }
                const _pOx = originX + (_cgx + 1.5) * GRID_STEP_X;
                const _pOy = originY + _cgy * GRID_STEP_Y - _pH / 2;
                const _pRoomOx = _pOx + _PAD - _pb.min_x * GRID_STEP_X;
                const _pRoomOy = _pOy + _PAD + 24 - _pb.min_y * GRID_STEP_Y;
                const pp = pocket.pocket_positions[String(vnum)];
                if (!pp) return;
                roomCenterX = _pRoomOx + pp[0] * GRID_STEP_X + ROOM_WIDTH / 2;
                roomCenterY = _pRoomOy + pp[1] * GRID_STEP_Y + ROOM_HEIGHT / 2;
            } else {
                roomCenterX = originX + room.grid_x * GRID_STEP_X + ROOM_WIDTH / 2;
                roomCenterY = originY + room.grid_y * GRID_STEP_Y + ROOM_HEIGHT / 2;
            }

            const svg = document.getElementById('mapSvg');
            const containerWidth = svg.parentElement.clientWidth;
            const containerHeight = svg.parentElement.clientHeight;
            state.panX = (containerWidth / 2) - (roomCenterX * state.zoom);
            state.panY = (containerHeight / 2) - (roomCenterY * state.zoom);
        }

        async function jumpToRoom() {
            const input = document.getElementById('roomSearchInput');
            const vnum = parseInt(input.value.trim(), 10);
            if (isNaN(vnum) || vnum <= 0) {
                input.classList.add('not-found');
                setTimeout(() => input.classList.remove('not-found'), 1200);
                return;
            }

            // Search loaded zones first (fast path)
            for (const [zoneName, data] of Object.entries(state.allZones)) {
                for (const floorId of Object.keys(data.floors)) {
                    if (data.floors[floorId].rooms[String(vnum)]) {
                        if (state.currentZone !== zoneName) {
                            state.currentZone = zoneName;
                            document.getElementById('zoneDropdown').value = zoneName;
                            state.goPortalView = null;
                            state.portalHistory = [];
                        }
                        state.currentFloor = parseInt(floorId);
                        await navigateToRoom(vnum, zoneName);
                        updateSidebar();
                        return;
                    }
                }
            }

            // Not in loaded zones — load remaining zones and search
            for (const zoneName of state.zoneNames) {
                if (state.allZones[zoneName]) continue;
                const data = await loadZoneData(zoneName);
                if (!data) continue;
                for (const floorId of Object.keys(data.floors)) {
                    if (data.floors[floorId].rooms[String(vnum)]) {
                        state.currentZone = zoneName;
                        document.getElementById('zoneDropdown').value = zoneName;
                        state.goPortalView = null;
                        state.portalHistory = [];
                        state.currentFloor = parseInt(floorId);
                        await navigateToRoom(vnum, zoneName);
                        updateSidebar();
                        return;
                    }
                }
            }

            // Not found in any zone
            input.classList.add('not-found');
            setTimeout(() => input.classList.remove('not-found'), 1200);
        }

        function updateZoomLevel() {
            document.getElementById('zoomLevel').textContent = Math.round(state.zoom * 100) + '%';
        }

        document.getElementById('zoomInBtn').onclick = () => {
            state.zoom = Math.min(MAX_ZOOM, Math.round((state.zoom + ZOOM_STEP) * 10) / 10);
            updateZoomLevel();
            if (state.selectedRoom) centerOnRoom(state.selectedRoom);
            render();
        };

        document.getElementById('zoomOutBtn').onclick = () => {
            state.zoom = Math.max(MIN_ZOOM, Math.round((state.zoom - ZOOM_STEP) * 10) / 10);
            updateZoomLevel();
            if (state.selectedRoom) centerOnRoom(state.selectedRoom);
            render();
        };

        document.getElementById('resetBtn').onclick = () => {
            resetView();
            render();
        };

        document.getElementById('roomSearchBtn').onclick = () => jumpToRoom();
        document.getElementById('roomSearchInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); jumpToRoom(); }
        });


        // ── Keyboard shortcuts ────────────────────────────────────────────
        document.addEventListener('keydown', (e) => {
            // Don't capture when typing in inputs
            if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
            switch (e.key) {
                case '+': case '=':
                    state.zoom = Math.min(MAX_ZOOM, Math.round((state.zoom + ZOOM_STEP) * 10) / 10);
                    updateZoomLevel();
                    if (state.selectedRoom) centerOnRoom(state.selectedRoom);
                    render();
                    break;
                case '-':
                    state.zoom = Math.max(MIN_ZOOM, Math.round((state.zoom - ZOOM_STEP) * 10) / 10);
                    updateZoomLevel();
                    if (state.selectedRoom) centerOnRoom(state.selectedRoom);
                    render();
                    break;
                case 'r': case 'R':
                    resetView(); render();
                    break;
                case 'Escape':
                    if (document.getElementById('npcModal').style.display !== 'none') { hideNpcModal(); }
                    else if (state.warpPocketView) { exitWarpPocket(); }
                    else if (state.goPortalView) { exitGoPortalView(); }
                    else if (state.portalHistory.length > 0) { returnFromPortal(); }
                    break;
            }
        });

        function updateBreadcrumb() {
            const breadcrumbEl = document.getElementById('breadcrumb');
            if (breadcrumbEl) breadcrumbEl.textContent = '';
        }

        // Zoom with mouse wheel — incremental steps clamped to [MIN_ZOOM, MAX_ZOOM]
        document.getElementById('mapContainer').addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP;
            state.zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM,
                Math.round((state.zoom + delta) * 10) / 10));
            updateZoomLevel();
            if (state.selectedRoom) centerOnRoom(state.selectedRoom);
            render();
        });

        // Pan with drag
        const mapContainer = document.getElementById('mapContainer');
        mapContainer.addEventListener('mousedown', (e) => {
            state.isDragging = true;
            state.dragStart = { x: e.clientX, y: e.clientY };
            mapContainer.classList.add('dragging');
        });

        document.addEventListener('mousemove', (e) => {
            // DEV: room drag takes priority over canvas pan (remove before live)
            if (state._roomDrag) {
                const d = state._roomDrag;
                // Below a small pixel threshold this is still a click, not a drag —
                // don't move the node yet, so a plain click selects it on mouseup.
                if (!d.moved &&
                    Math.abs(e.clientX - d.startX) < 4 &&
                    Math.abs(e.clientY - d.startY) < 4) return;
                d.moved = true;
                const svg = document.getElementById('mapSvg');
                const r = svg.getBoundingClientRect();
                const sx = (e.clientX - r.left - state.panX) / state.zoom;
                const sy = (e.clientY - r.top  - state.panY) / state.zoom;
                const gx = Math.round((sx - d.grabDX - DEV_originX) / GRID_STEP_X);
                const gy = Math.round((sy - d.grabDY - DEV_originY) / GRID_STEP_Y);
                if (gx !== d.curGX || gy !== d.curGY) {
                    d.curGX = gx;
                    d.curGY = gy;
                    state.posOverrides[d.vnum] = { gx, gy };
                    render();
                }
                return;
            }
            if (state.isDragging && state.dragStart) {
                const dx = e.clientX - state.dragStart.x;
                const dy = e.clientY - state.dragStart.y;
                state.panX += dx;
                state.panY += dy;
                state.dragStart = { x: e.clientX, y: e.clientY };
                render();
            }
        });

        document.addEventListener('mouseup', () => {
            // DEV: finalize room drag and update override panel (remove before live)
            if (state._roomDrag) {
                const d = state._roomDrag;
                state._roomDrag = null;
                if (d.moved) {
                    DEV_updateOverrides();          // a drag — record the new position
                } else {
                    state.selectedRoom = parseInt(d.vnum);  // a click — select the node
                    render();
                }
            }
            state.isDragging = false;
            mapContainer.classList.remove('dragging');
        });

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

            if (last && last.zone === state.currentZone && last.floor === state.currentFloor && last.vnum === state.selectedRoom) return;
            state.navHistory.push({ zone: state.currentZone, floor: state.currentFloor, vnum: state.selectedRoom });

            state.currentFloor = prev.floor;
