        function TRIAGE_computeIssues(floor) {
            const rooms = floor.rooms;
            const OPPOSITE = {n:'s',s:'n',e:'w',w:'e',ne:'sw',sw:'ne',nw:'se',se:'nw',
                fore:'aft',aft:'fore',port:'starboard',starboard:'port',
                fo:'af',af:'fo',po:'sb',sb:'po',u:'d',d:'u'};
            const NS_DIRS  = new Set(['n','s','fore','aft','fo','af']);
            const EW_DIRS  = new Set(['e','w','port','starboard','po','sb']);
            const UD_DIRS  = new Set(['u','d']);

            const diagonals  = [];
            const oneways    = [];
            const ud_oneways = [];
            const seenDiag   = new Set();

            Object.entries(rooms).forEach(([vnumStr, room]) => {
                const fromVnum = parseInt(vnumStr);
                Object.entries(room.exits || {}).forEach(([dir, ex]) => {
                    if (ex.is_cross_zone || ex.is_portal) return;
                    const toVnum = ex.to_vnum;
                    const toRoom = rooms[String(toVnum)];
                    if (!toRoom) return;

                    const isNS = NS_DIRS.has(dir);
                    const isEW = EW_DIRS.has(dir);
                    const isUD = UD_DIRS.has(dir);
                    const opp  = OPPOSITE[dir];
                    const hasReturn = (opp && toRoom.exits && toRoom.exits[opp]
                                       && toRoom.exits[opp].to_vnum === fromVnum)
                                   || Object.values(toRoom.exits || {}).some(
                                       ex => ex.to_vnum === fromVnum && !ex.is_cross_zone && !ex.is_portal);

                    if (isNS || isEW) {
                        // Diagonal: N/S pair with different grid_x, or E/W pair with different grid_y
                        const isDiag = (isNS && room.grid_x !== toRoom.grid_x) ||
                                       (isEW && room.grid_y !== toRoom.grid_y);
                        if (isDiag) {
                            // Deduplicate by unordered pair + direction axis
                            const dk = [Math.min(fromVnum, toVnum), Math.max(fromVnum, toVnum), isNS ? 'ns' : 'ew'].join(':');
                            if (!seenDiag.has(dk)) {
                                seenDiag.add(dk);
                                diagonals.push({from: fromVnum, dir, to: toVnum, fromName: room.name, toName: toRoom.name});
                            }
                        }
                        if (!hasReturn) {
                            oneways.push({from: fromVnum, dir, to: toVnum, fromName: room.name, toName: toRoom.name});
                        }
                    } else if (isUD && !hasReturn) {
                        ud_oneways.push({from: fromVnum, dir, to: toVnum, fromName: room.name, toName: toRoom.name});
                    }
                });
            });

            return { diagonals, oneways, ud_oneways };
        }

        function TRIAGE_buildSidebar(issues, zoneName, floorId) {
            const panel = document.getElementById('triagePanel');
            panel.style.display = 'block';
            panel._issues  = issues;
            panel._zone    = zoneName;
            panel._floor   = floorId;

            const total = issues.diagonals.length + issues.oneways.length + issues.ud_oneways.length;
            const clean = total === 0;
            const hdr   = clean ? '#4caf82' : '#e8a020';

            let h = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
                <span style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:1.5px;color:${hdr};text-transform:uppercase;">⚑ Triage</span>
                <span style="font-size:11px;color:${hdr};">${clean ? '✓ Clean' : total + ' issue' + (total > 1 ? 's' : '')}</span>
            </div>`;

            if (clean) {
                h += `<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:6px 0;">No issues on this floor</div>`;
                panel.innerHTML = h;
                return;
            }

            h += `<button onclick="TRIAGE_copyAll()" style="width:100%;margin-bottom:10px;padding:5px 8px;background:#1a1200;border:1px solid #e8a020;color:#e8a020;border-radius:4px;cursor:pointer;font-size:11px;font-family:'Cinzel',serif;letter-spacing:0.5px;" id="triageCopyBtn">COPY ALL ISSUES</button>`;

            const section = (color, icon, label, items) => {
                if (!items.length) return '';
                let s = `<div style="color:${color};font-size:10px;font-family:'Cinzel',serif;letter-spacing:0.5px;margin-bottom:3px;text-transform:uppercase;">${icon} ${label} (${items.length})</div><div style="margin-bottom:9px;">`;
                items.forEach(({from, dir, to, fromName, toName}) => {
                    s += `<div onclick="navigateToRoom(${from})" style="font-family:monospace;font-size:11px;color:var(--text-primary);padding:2px 5px;border-left:2px solid ${color};margin-bottom:2px;cursor:pointer;user-select:text;" title="${fromName} → ${toName}">${from} &gt; ${dir} &gt; ${to}</div>`;
                });
                return s + '</div>';
            };

            h += section('#e040fb', '▣', 'Diagonal Exits',  issues.diagonals);
            h += section('#ff9800', '↩', 'One-Way Exits',   issues.oneways);
            h += section('#4caf82', '⬍', 'One-Way U/D',     issues.ud_oneways);

            panel.innerHTML = h;
        }

        function TRIAGE_copyAll() {
            const panel = document.getElementById('triagePanel');
            const issues = panel._issues;
            if (!issues) return;
            const lines = [`TRIAGE: ${panel._zone} — Floor ${panel._floor}`];
            if (issues.diagonals.length) {
                lines.push('', `DIAGONAL CARDINAL EXITS (${issues.diagonals.length}):`);
                issues.diagonals.forEach(({from, dir, to}) => lines.push(`${from} > ${dir} > ${to}`));
            }
            if (issues.oneways.length) {
                lines.push('', `ONE-WAY CARDINAL EXITS (${issues.oneways.length}):`);
                issues.oneways.forEach(({from, dir, to}) => lines.push(`${from} > ${dir} > ${to}`));
            }
            if (issues.ud_oneways.length) {
                lines.push('', `ONE-WAY U/D EXITS (${issues.ud_oneways.length}):`);
                issues.ud_oneways.forEach(({from, dir, to}) => lines.push(`${from} > ${dir} > ${to}`));
            }
            navigator.clipboard.writeText(lines.join('\n')).then(() => {
                const btn = document.getElementById('triageCopyBtn');
                if (btn) { btn.textContent = '✓ COPIED!'; setTimeout(() => { btn.textContent = 'COPY ALL ISSUES'; }, 2000); }
            });
        }

        function DEV_downloadOverrides() {
            const content = document.getElementById('DEV_overrideText').value;
            const blob = new Blob([content], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'zone_grid_overrides_new.csv';
            a.click();
            URL.revokeObjectURL(a.href);
        }
        // ============================================================================
        // DEV: Trace Tool — remove this entire block before going live
        // ============================================================================
        function DEV_traceGetDir(fromVnum, toVnum) {
            const zone = state.allZones[state.currentZone];
            if (!zone) return null;
            const INVERSE = {n:'s',s:'n',e:'w',w:'e',u:'d',d:'u',ne:'sw',sw:'ne',nw:'se',se:'nw'};
            // Direct: fromVnum has an exit leading to toVnum
            for (const floor of Object.values(zone.floors)) {
                const room = floor.rooms[String(fromVnum)];
                if (!room) continue;
                for (const exit of Object.values(room.exits || {})) {
                    if (String(exit.to_vnum) === String(toVnum)) return exit.direction;
                }
            }
            // Inverse: toVnum has an exit leading back to fromVnum — infer the forward direction
            for (const floor of Object.values(zone.floors)) {
                const room = floor.rooms[String(toVnum)];
                if (!room) continue;
                for (const exit of Object.values(room.exits || {})) {
                    if (String(exit.to_vnum) === String(fromVnum)) {
                        const inv = INVERSE[exit.direction];
                        return inv ? `${inv}?` : `?${exit.direction}`;
                    }
                }
            }
            return null;
        }

        function DEV_traceUpdate() {
            const ta = document.getElementById('DEV_traceText');
            if (!ta) return;
            if (state.traceChain.length === 0) { ta.value = ''; return; }
            const parts = [String(state.traceChain[0])];
            for (let i = 1; i < state.traceChain.length; i++) {
                const dir = DEV_traceGetDir(state.traceChain[i - 1], state.traceChain[i]);
                if (dir) parts.push(dir);
                parts.push(String(state.traceChain[i]));
            }
            ta.value = parts.join(' > ');
        }

        function DEV_toggleTrace() {
            state.traceMode = !state.traceMode;
            const btn = document.getElementById('DEV_traceBtn');
            btn.textContent = state.traceMode ? 'Trace ON' : 'Trace Path';
            btn.style.background = state.traceMode ? '#e8a020' : '';
            btn.style.color = state.traceMode ? '#000' : '';
            document.getElementById('DEV_tracePanel').style.display = state.traceMode ? 'block' : 'none';
            if (!state.traceMode) DEV_traceClear();
        }

        function DEV_traceUndo() {
            state.traceChain.pop();
            DEV_traceUpdate();
        }

        function DEV_traceClear() {
            state.traceChain = [];
            DEV_traceUpdate();
        }
        // ============================================================================
        // END DEV block
        // ============================================================================

        async function init() {
            const zoneDropdown = document.getElementById('zoneDropdown');

            // Load zones, NPC stats, and item stats in parallel
            try {
                const _cb = '?t=' + Date.now();
                // Public release index: zones_public.json is the whitelist of
                // production-ready zones. If it's missing (dev / not yet built),
                // fall back to the full zones.json so the viewer still works.
                let zoneResp = await fetch('maps/zones_public.json' + _cb, { cache: 'no-store' }).catch(() => null);
                if (!zoneResp || !zoneResp.ok) {
                    zoneResp = await fetch('maps/zones.json' + _cb, { cache: 'no-store' });
                }
                const [npcResp, itemResp] = await Promise.all([
                    fetch('maps/npcs.json' + _cb, { cache: 'no-store' }).catch(() => null),
                    fetch('maps/items.json' + _cb, { cache: 'no-store' }).catch(() => null),
                ]);
                if (zoneResp.ok) state.zoneNames = await zoneResp.json();
                if (npcResp?.ok)  state.npcData  = await npcResp.json();
                if (itemResp?.ok) state.itemData = await itemResp.json();
            } catch (_) {}

            if (state.zoneNames.length === 0) {
                zoneDropdown.innerHTML =
                    '<option value="">No zones.json found — run export script first</option>';
                document.getElementById('mapTitle').textContent =
                    'Run generate_json_proper.bat to generate zone data';
                return;
            }

            // Populate dropdown
            zoneDropdown.innerHTML = '';
            state.zoneNames.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                zoneDropdown.appendChild(opt);
            });

            // Change handler
            zoneDropdown.addEventListener('change', async (e) => {
                const newZone = e.target.value;
                if (newZone && newZone !== state.currentZone) {
                    NAV_pushHistory();
                    state.currentZone   = newZone;
                    state.goPortalView  = null;
                    state.portalHistory = [];
                    document.getElementById('mapTitle').textContent = 'Loading…';
                    const data = await loadZoneData(newZone);
                    if (data) {
                        // Pick the highest floor id (surface = 0, underground = negative)
                        const floorIds = Object.keys(data.floors).map(k => parseInt(k)).sort((a, b) => b - a);
                        // Use zone-level entry_vnum (cross-zone arrival) if present;
                        // fall back to highest floor's entry_vnum.
                        const zoneEntry = data.entry_vnum;
                        if (zoneEntry) {
                            for (const [fid, fl] of Object.entries(data.floors)) {
                                if (fl.rooms[String(zoneEntry)]) {
                                    state.currentFloor = parseInt(fid);
                                    break;
                                }
                            }
                        } else {
                            state.currentFloor = floorIds[0] ?? 0;
                        }
                        const entryFloor = data.floors[String(state.currentFloor)];
                        const targetRoom = zoneEntry ?? entryFloor?.entry_vnum ?? null;
                        state.selectedRoom = targetRoom;
                        state.zoom = 1.0;
                        state.panX = 0;
                        state.panY = 0;
                        updateZoomLevel();
                        if (targetRoom) centerOnRoom(targetRoom);
                        render();
                    }
                }
            });

            // Always open on City of Mareldja, room 40000 when available;
            // otherwise fall back to the first zone in the list.
            const DEFAULT_ZONE = 'City of Mareldja';
            const DEFAULT_ROOM = '40000';
            const first = state.zoneNames.includes(DEFAULT_ZONE)
                ? DEFAULT_ZONE : state.zoneNames[0];
            state.currentZone = first;
            zoneDropdown.value = first;
            document.getElementById('mapTitle').textContent = 'Loading…';
            const data = await loadZoneData(first);
            if (data) {
                const floorIds = Object.keys(data.floors).map(k => parseInt(k)).sort((a, b) => b - a);
                // Focus the default room (40000) if it exists in this zone, else
                // the highest floor's entry room.
                let focusFloor = null;
                if (first === DEFAULT_ZONE) {
                    for (const [fid, fl] of Object.entries(data.floors)) {
                        if (fl.rooms[String(DEFAULT_ROOM)]) { focusFloor = parseInt(fid); break; }
                    }
                }
                if (focusFloor !== null) {
                    state.currentFloor = focusFloor;
                    state.selectedRoom = DEFAULT_ROOM;
                    resetView(false);   // keeps selectedRoom (40000) and centers on it
                } else {
                    state.currentFloor = floorIds[0] ?? 0;
                    const entryFloor = data.floors[String(state.currentFloor)];
                    state.selectedRoom = entryFloor?.entry_vnum ?? null;
                    resetView(true);
                }
                render();
            } else {
                document.getElementById('mapTitle').textContent = 'Error loading zone';
            }
        }

        // ── Touch support ─────────────────────────────────────────────────
        let lastTouchDist = null;
        let lastTouchCenter = null;

        mapContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                state.isDragging = true;
                state.dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            } else if (e.touches.length === 2) {
                state.isDragging = false;
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastTouchDist = Math.sqrt(dx * dx + dy * dy);
                lastTouchCenter = {
                    x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
                    y: (e.touches[0].clientY + e.touches[1].clientY) / 2
                };
            }
        }, { passive: true });

        mapContainer.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && state.isDragging && state.dragStart) {
                const dx = e.touches[0].clientX - state.dragStart.x;
                const dy = e.touches[0].clientY - state.dragStart.y;
                state.panX += dx;
                state.panY += dy;
                state.dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                render();
            } else if (e.touches.length === 2 && lastTouchDist !== null) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const scale = dist / lastTouchDist;
                const newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM,
                    Math.round(state.zoom * scale * 10) / 10));
                if (newZoom !== state.zoom) {
                    state.zoom = newZoom;
                    updateZoomLevel();
                    if (state.selectedRoom) centerOnRoom(state.selectedRoom);
                    render();
                }
                lastTouchDist = dist;
            }
        }, { passive: false });

        mapContainer.addEventListener('touchend', () => {
            state.isDragging = false;
            lastTouchDist = null;
        }, { passive: true });

        // ── Mobile sidebar toggle ─────────────────────────────────────────
        const sidebarEl = document.getElementById('sidebar');
        const overlayEl = document.getElementById('sidebarOverlay');
        const toggleBtn = document.getElementById('sidebarToggle');

        function openSidebar() {
            sidebarEl.classList.add('open');
            overlayEl.classList.add('open');
            toggleBtn.setAttribute('aria-expanded', 'true');
            toggleBtn.textContent = '✕';
        }

        function closeSidebar() {
            sidebarEl.classList.remove('open');
            overlayEl.classList.remove('open');
            toggleBtn.setAttribute('aria-expanded', 'false');
            toggleBtn.textContent = '☰';
        }

        toggleBtn.onclick = () => {
            if (sidebarEl.classList.contains('open')) { closeSidebar(); }
            else { openSidebar(); }
        };

        overlayEl.addEventListener('click', () => { closeSidebar(); });

        // Close sidebar after selecting an exit on mobile
        document.getElementById('exitsSection').addEventListener('click', () => {
            if (window.innerWidth <= 768) closeSidebar();
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) { closeSidebar(); }
        });

        // ── Floating joystick compass collapse ────────────────────────────
        const mapCompassEl = document.getElementById('mapCompass');
        const mcToggleBtn   = document.getElementById('mcToggle');
        function setCompassCollapsed(collapsed) {
            mapCompassEl.classList.toggle('collapsed', collapsed);
            mcToggleBtn.textContent = collapsed ? '🧭' : '–';
            mcToggleBtn.setAttribute('aria-label', collapsed ? 'Expand compass' : 'Collapse compass');
            mcToggleBtn.title = collapsed ? 'Expand compass' : 'Collapse compass';
        }
        // Start expanded on phones/tablets (the primary use case), collapsed to a
        // round button on desktop where the sidebar compass is already visible.
        setCompassCollapsed(window.innerWidth > 768);
        mcToggleBtn.addEventListener('click', () => {
            setCompassCollapsed(!mapCompassEl.classList.contains('collapsed'));
        });

        // ── NPC toggle & search ───────────────────────────────────────────
        document.getElementById('hoverCard').addEventListener('mouseenter', cancelHideHoverCard);
        document.getElementById('hoverCard').addEventListener('mouseleave', scheduleHideHoverCard);
        document.getElementById('npcModalClose').onclick = hideNpcModal;
        document.getElementById('npcModal').addEventListener('click', e => {
            if (e.target === document.getElementById('npcModal')) hideNpcModal();
        });


        init();
    </script>
</body>
